name: Publish to Chrome Web Store

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: ver
        run: |
          NEW=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          OLD=$(git show HEAD~1:manifest.json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null \
            || echo "")
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          if [ "$NEW" != "$OLD" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package extension
        if: steps.ver.outputs.changed == 'true'
        run: |
          zip -r extension.zip \
            manifest.json \
            popup.html popup.js \
            ranker.html ranker.js \
            collges.html ranks.csv \
            icons/

      - name: Create GitHub release
        if: steps.ver.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.new }}
          name: v${{ steps.ver.outputs.new }}
          generate_release_notes: true
          files: extension.zip

      - name: Publish to Chrome Web Store
        if: steps.ver.outputs.changed == 'true'
        run: npx chrome-webstore-upload-cli@latest upload --auto-publish
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
